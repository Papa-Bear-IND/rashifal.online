name: Rashifal Generator

on:
  schedule:
    # Daily — every day at 23:30 UTC = 05:00 IST next day
    - cron: '30 23 * * *'
    # Weekly — Sundays at 23:30 UTC = 05:00 IST Monday
    - cron: '30 23 * * 0'
    # Monthly — 28th of each month at 22:00 UTC (covers Feb; we filter inside the job)
    - cron: '0 22 28-31 * *'
    # Yearly — December 30 at 22:00 UTC
    - cron: '0 22 30 12 *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to generate (daily / weekly / monthly / yearly / all)'
        required: false
        default: 'all'
      date:
        description: 'Target date YYYY-MM-DD (optional)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decide mode + date
        id: plan
        env:
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_DATE: ${{ github.event.inputs.date }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -e
          # Manual dispatch path
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${DISPATCH_MODE:-all}"
            DATE="${DISPATCH_DATE}"
            if [ -z "$DATE" ]; then DATE=$(date -u -d "+1 day" +%Y-%m-%d); fi
            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
            echo "date=$DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Schedule path — disambiguate by cron string
          TODAY_UTC=$(date -u +%Y-%m-%d)
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)
          DOM=$(date -u +%-d)
          MONTH=$(date -u +%-m)
          # Last day of current month
          LAST_DOM=$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%-d)
          case "$SCHEDULE" in
            "30 23 * * *")
              MODE="daily"; DATE="$TOMORROW";;
            "30 23 * * 0")
              MODE="weekly"; DATE="$TOMORROW";;
            "0 22 28-31 * *")
              if [ "$DOM" = "$LAST_DOM" ]; then
                MODE="monthly"; DATE="$TODAY_UTC"
              else
                echo "Not last day of month — skipping"; MODE="skip"; DATE="$TODAY_UTC"
              fi
              ;;
            "0 22 30 12 *")
              MODE="yearly"; DATE="$TODAY_UTC";;
            *)
              MODE="daily"; DATE="$TOMORROW";;
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Generate
        if: steps.plan.outputs.mode != 'skip'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_content.py "${{ steps.plan.outputs.mode }}" "${{ steps.plan.outputs.date }}"

      - name: Commit and push
        if: steps.plan.outputs.mode != 'skip'
        run: |
          git config user.name "Rashifal Bot"
          git config user.email "bot@rashifal.online"
          git add content/
          git diff --staged --quiet || git commit -m "🔮 ${{ steps.plan.outputs.mode }} rashifal: ${{ steps.plan.outputs.date }}"
          git push
