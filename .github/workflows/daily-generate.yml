name: Rashifal Generator

on:
  schedule:
    # All times are UTC. IST = UTC + 5:30. We must publish BEFORE IST midnight
    # (18:30 UTC) so the new IST date's file is live the moment users wake up.
    # Daily â€” every day at 17:00 UTC = 22:30 IST (90 min before IST midnight)
    - cron: '0 17 * * *'
    # Weekly â€” Sundays at 16:30 UTC = 22:00 IST Sunday (publishes Mon's week)
    - cron: '30 16 * * 0'
    # Monthly â€” fires daily 28-31 at 16:00 UTC; job filters to last day of month
    - cron: '0 16 28-31 * *'
    # Yearly â€” December 31 at 15:30 UTC = 21:00 IST (publishes next year)
    - cron: '30 15 31 12 *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to generate (daily / weekly / monthly / yearly / all)'
        required: false
        default: 'all'
      date:
        description: 'Target date YYYY-MM-DD (optional)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decide mode + date
        id: plan
        env:
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_DATE: ${{ github.event.inputs.date }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -e
          # Manual dispatch path
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${DISPATCH_MODE:-all}"
            DATE="${DISPATCH_DATE}"
            if [ -z "$DATE" ]; then DATE=$(date -u -d "+1 day" +%Y-%m-%d); fi
            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
            echo "date=$DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Schedule path â€” compute dates in IST so files match what the site requests.
          # IST "tomorrow" = the date the site will look for once IST midnight ticks over.
          IST_TODAY=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          IST_TOMORROW=$(TZ=Asia/Kolkata date -d "+1 day" +%Y-%m-%d)
          IST_DOM=$(TZ=Asia/Kolkata date -d "+1 day" +%-d)
          # First day of the month *after* IST tomorrow's month â€” used for monthly rollover
          NEXT_MONTH_FIRST=$(TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-01) +1 month" +%Y-%m-%d)
          # Last day of IST current month
          LAST_DOM=$(TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-01) +1 month -1 day" +%-d)
          IST_DOM_NOW=$(TZ=Asia/Kolkata date +%-d)
          case "$SCHEDULE" in
            "0 17 * * *")
              MODE="daily"; DATE="$IST_TOMORROW";;
            "30 16 * * 0")
              MODE="weekly"; DATE="$IST_TOMORROW";;
            "0 16 28-31 * *")
              if [ "$IST_DOM_NOW" = "$LAST_DOM" ]; then
                # On the last day of the IST month, generate NEXT month's file
                MODE="monthly"; DATE="$NEXT_MONTH_FIRST"
              else
                echo "Not last day of IST month â€” skipping"; MODE="skip"; DATE="$IST_TODAY"
              fi
              ;;
            "30 15 31 12 *")
              # Generate next year's yearly file
              NEXT_YEAR=$(TZ=Asia/Kolkata date -d "+1 day" +%Y)
              MODE="yearly"; DATE="${NEXT_YEAR}-01-01";;
            *)
              MODE="daily"; DATE="$IST_TOMORROW";;
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Generate
        if: steps.plan.outputs.mode != 'skip'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_content.py "${{ steps.plan.outputs.mode }}" "${{ steps.plan.outputs.date }}"

      - name: Commit and push
        if: steps.plan.outputs.mode != 'skip'
        run: |
          git config user.name "Rashifal Bot"
          git config user.email "bot@rashifal.online"
          git add content/
          git diff --staged --quiet || git commit -m "đź”® ${{ steps.plan.outputs.mode }} rashifal: ${{ steps.plan.outputs.date }}"
          git push
